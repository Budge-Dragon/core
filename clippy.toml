# Mechanical enforcement of mu-core portability rules (see README).

# Proper nouns clippy::doc_markdown should not demand backticks for.
# OpenMU (the reference server) and MonsterSetBase (a classic data file) are
# domain proper nouns the schema docs cite for provenance — names, not code,
# so backticking them would misrender them as identifiers.
# ".." keeps clippy's built-in defaults.
doc-valid-idents = ["SpacetimeDB", "NPCs", "OpenMU", "MonsterSetBase", ".."]

# services::monster_ai::decide_monster_action takes eight distinct, non-bundleable
# domain inputs (the mob and its behavior, the optional target, the clock and tick
# length, the walk grid, the movement capability, and the injected RNG). The
# movement-capability input is supplied so the AI stays effect-unaware; bundling
# any of these into a config struct is the banned Extract-Parameter-Object patch
# (CLAUDE.md, "Deep modules, not shallow ones"), so the threshold is raised at the
# config layer rather than suppressed at the call site.
# services::skills::resolve_target_hit shares the same shape at eight (the batch
# index, two profiles, the skill, the strike basis, the attacker placement for
# the push's away-vector, the walk grid, and the injected RNG) — each justified
# in its doc comment, none bundleable.
too-many-arguments-threshold = 8

# data::atlas::resolve::resolve_chaos_recipe is the total record-to-resolved
# join over the nine-family chaos-recipe catalog: one match arm per family,
# each a field-for-field carry-over plus its output join. Its length is the
# catalog's vocabulary breadth (nine variants, ~50 fields), not a second
# concern — any further split is the temporal decomposition CLAUDE.md bans, so
# the pedantic default (100) is raised here at the config layer, never at the
# call site.
too-many-lines-threshold = 130

# services::shop::RepairSubject::Equipped carries a whole worn Equipment set
# (twelve Option<ItemInstance> slots) beside the cell-addressed Stored variant —
# the domain shape of "repair the item worn in this slot". W-EQUIP's persisted
# WearLedger widened ItemInstance past the 200-byte default; boxing a pure
# domain value to appease a performance hint would put a heap indirection
# inside the hexagon's plain data, so the threshold is raised at the config
# layer instead.
enum-variant-size-threshold = 512

# components::class::ClassSet is the total membership structure over the
# eight-class roster: eight named bools whose exhaustive `allows` match makes
# an out-of-roster query unrepresentable (the spec's total-structure pattern).
# A HashSet/enum-set would reintroduce the Option-returning lookup that design
# kills, so the eight bools are the correct shape.
max-struct-bools = 8

# Iron Law 3 lints (unwrap_used, expect_used, panic) apply to core code;
# tests assert freely.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-indexing-slicing-in-tests = true

disallowed-types = [
    # f32/f64 are NOT listed here: serde's derived Deserialize visitors name
    # visit_f32/visit_f64, so disallowed-types would false-positive on every
    # #[derive(Deserialize)] type. Float MATH — the actual determinism hazard —
    # is caught mechanically by clippy::float_arithmetic (workspace Cargo.toml);
    # a bare float field declaration is review-enforced (see CLAUDE.md).
    { path = "std::time::SystemTime", reason = "no wall-clock time in core; timing is tick-based" },
    { path = "std::time::Instant", reason = "no wall-clock time in core; timing is tick-based" },
    { path = "std::collections::HashMap", reason = "RandomState is entropy-seeded — a hidden non-injected randomness source with nondeterministic, cross-target-divergent iteration order; use BTreeMap (keys are Ord newtypes)" },
    { path = "std::collections::HashSet", reason = "RandomState is entropy-seeded — a hidden non-injected randomness source with nondeterministic, cross-target-divergent iteration order; use BTreeSet (keys are Ord newtypes)" },
    { path = "std::hash::RandomState", reason = "entropy-seeded hasher — a hidden non-injected randomness source; core is determinism-first" },
    { path = "std::collections::hash_map::RandomState", reason = "entropy-seeded hasher — a hidden non-injected randomness source; core is determinism-first" },
]

disallowed-methods = [
    { path = "std::thread::spawn", reason = "no threading in core" },
    { path = "std::thread::Builder::spawn", reason = "no threading in core" },
    { path = "std::thread::scope", reason = "no threading in core" },
    { path = "std::thread::sleep", reason = "no blocking or timing in core" },
]

disallowed-macros = [
    { path = "std::println", reason = "no logging in core; return events instead" },
    { path = "std::print", reason = "no logging in core; return events instead" },
    { path = "std::eprintln", reason = "no logging in core; return events instead" },
    { path = "std::eprint", reason = "no logging in core; return events instead" },
    { path = "std::dbg", reason = "no logging in core; return events instead" },
]
