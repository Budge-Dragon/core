# Mechanical enforcement of mu-core portability rules (see README).

# Proper nouns clippy::doc_markdown should not demand backticks for.
# OpenMU (the reference server) and MonsterSetBase (a classic data file) are
# domain proper nouns the schema docs cite for provenance — names, not code,
# so backticking them would misrender them as identifiers.
# ".." keeps clippy's built-in defaults.
doc-valid-idents = ["SpacetimeDB", "NPCs", "OpenMU", "MonsterSetBase", ".."]

# components::class::ClassSet is the total membership structure over the
# eight-class roster: eight named bools whose exhaustive `allows` match makes
# an out-of-roster query unrepresentable (the spec's total-structure pattern).
# A HashSet/enum-set would reintroduce the Option-returning lookup that design
# kills, so the eight bools are the correct shape.
max-struct-bools = 8

# Iron Law 3 lints (unwrap_used, expect_used, panic) apply to core code;
# tests assert freely.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-indexing-slicing-in-tests = true

disallowed-types = [
    { path = "std::time::SystemTime", reason = "no wall-clock time in core; timing is tick-based" },
    { path = "std::time::Instant", reason = "no wall-clock time in core; timing is tick-based" },
]

disallowed-methods = [
    { path = "std::thread::spawn", reason = "no threading in core" },
    { path = "std::thread::Builder::spawn", reason = "no threading in core" },
    { path = "std::thread::scope", reason = "no threading in core" },
    { path = "std::thread::sleep", reason = "no blocking or timing in core" },
]

disallowed-macros = [
    { path = "std::println", reason = "no logging in core; return events instead" },
    { path = "std::print", reason = "no logging in core; return events instead" },
    { path = "std::eprintln", reason = "no logging in core; return events instead" },
    { path = "std::eprint", reason = "no logging in core; return events instead" },
    { path = "std::dbg", reason = "no logging in core; return events instead" },
]
