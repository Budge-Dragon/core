name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32-unknown-emscripten, aarch64-apple-ios, aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      # Portability gate: the pure core must compile for every deployment
      # target. A failure here means a host/OS dependency leaked into core.
      - run: cargo check -p mu-core --target wasm32-unknown-unknown      # browser
      - run: cargo check -p mu-core --target wasm32-unknown-emscripten   # Unity WebGL
      - run: cargo check -p mu-core --target aarch64-apple-ios           # Unity iOS
      - run: cargo check -p mu-core --target aarch64-linux-android       # Unity Android
